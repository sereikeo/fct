name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/fct-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/fct-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_FRONTEND }}:latest
          no-cache: true

  deploy:
    runs-on: self-hosted
    needs: build-and-push
    steps:
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull latest images
        run: |
          cd /volume1/docker/fct
          docker-compose pull frontend backend

      - name: Redeploy backend
        run: |
          cd /volume1/docker/fct
          docker-compose up -d --force-recreate --no-deps backend

      - name: Redeploy frontend (repopulate dist volume)
        run: |
          cd /volume1/docker/fct
          docker-compose stop frontend
          docker-compose rm -f frontend
          docker volume rm fct_frontend_dist || true
          docker-compose up -d --no-deps frontend
          docker-compose restart caddy

      - name: Health check
        run: |
          sleep 5
          curl -sf http://192.168.1.105:3001/api/health || exit 1