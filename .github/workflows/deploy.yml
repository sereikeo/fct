name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/fct-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/fct-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_FRONTEND }}:latest
          no-cache: true

  deploy:
    runs-on: self-hosted
    needs: build-and-push
    steps:
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull latest images
        run: |
          cd /volume1/docker/fct
          docker-compose pull frontend backend

      - name: Redeploy backend
        run: |
          cd /volume1/docker/fct
          docker-compose up -d --force-recreate --no-deps backend

      - name: Redeploy frontend (wipe dist volume, repopulate from fresh image)
        run: |
          cd /volume1/docker/fct
          # Both frontend and caddy mount fct_frontend_dist. `docker volume rm`
          # rejects any volume attached to a container (even a stopped one), so
          # both containers must be removed before the wipe.
          docker-compose rm -sf frontend caddy
          # Wipe the volume. Docker only copies image contents into a named
          # volume when it is empty; without this, stale dist files persist
          # across deploys regardless of how fresh the image is.
          docker volume rm fct_frontend_dist
          # Bring frontend up first so it populates the fresh (empty) volume
          # with the new build, then start caddy so it mounts the new files.
          docker-compose up -d --no-deps frontend
          docker-compose up -d --no-deps caddy

      - name: Health check
        run: |
          sleep 5
          curl -sf http://192.168.1.105:3001/api/health || exit 1