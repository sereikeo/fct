services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "8484:80"
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - frontend_dist:/srv:ro
    depends_on:
      - backend

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-local}/fct-frontend:latest
    build:
      context: ./frontend
    volumes:
      - frontend_dist:/app/dist

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-local}/fct-backend:latest
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    volumes:
      - ${SQLITE_DIR:-./data}:/app/data

  runner:
    image: myoung34/github-runner:latest
    restart: unless-stopped
    environment:
      REPO_URL: ${GITHUB_REPO_URL:-}
      RUNNER_TOKEN: ${RUNNER_TOKEN:-}
      RUNNER_NAME: fct-runner
      RUNNER_WORKDIR: /tmp/runner
      RUNNER_SCOPE: repo
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  caddy_data:
  caddy_config:
  frontend_dist:

networks:
  default:
    name: fct-network
