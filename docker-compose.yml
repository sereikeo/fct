services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "8484:80"
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - frontend_dist:/srv:ro
    depends_on:
      - backend

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-local}/fct-frontend:latest
    build:
      context: ./frontend
    volumes:
      - frontend_dist:/app/dist

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-local}/fct-backend:latest
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    volumes:
      - ${SQLITE_DIR:-./data}:/app/data

  datasette:
    image: datasetteproject/datasette:latest
    restart: unless-stopped
    volumes:
      - ${SQLITE_DIR:-./data}:/data:ro
    command: >
      datasette /data/fct.db
      --host 0.0.0.0
      --port 8001
      --base-url /db/
      --setting sql_time_limit_ms 5000
      --setting max_returned_rows 1000
      --setting allow_download 0

  runner:
    image: myoung34/github-runner:latest
    restart: unless-stopped
    environment:
      REPO_URL: ${GITHUB_REPO_URL:-}
      ACCESS_TOKEN: ${GH_PAT:-}
      RUNNER_NAME: fct-runner
      RUNNER_WORKDIR: /tmp/runner
      RUNNER_SCOPE: repo
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /volume1/docker/fct:/volume1/docker/fct

volumes:
  caddy_data:
  caddy_config:
  frontend_dist:

